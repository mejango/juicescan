name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-suite:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Checkout pinned deploy-all-v6 deployment artifacts
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: Bananapus/deploy-all-v6
          ref: 316e9d4d3f9e1c5b41a5df7c0ad6183abbeccc7f
          path: .contract-source/deploy-all-v6
          sparse-checkout: deployments
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Verify the locked dependency graph
        run: npm run deps:check
      - name: Block high and critical production dependency advisories
        run: npm run audit:prod
      - name: Parse every JavaScript source
        run: npm run check:source
      - name: Verify pinned contract deployment parity
        env:
          DEPLOY_ALL_DEPLOYMENTS_DIR: ${{ github.workspace }}/.contract-source/deploy-all-v6/deployments
        run: npm run check:deployments
      - name: Regenerate contract-derived application data
        env:
          DEPLOY_ALL_DEPLOYMENTS_DIR: ${{ github.workspace }}/.contract-source/deploy-all-v6/deployments
        run: npm run check:generated
      - name: Check reviewed transaction inventory
        run: npm run transaction:check
      - name: Build production bundle
        run: npm run bundle
      - name: Unit, encoding, and coverage gates
        run: npm run test:coverage
      - name: Enforce production bundle budgets
        run: npm run check:bundle
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Production browser shape and accessibility
        run: npm run test:browser
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
