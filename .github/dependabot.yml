version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-patch-days: 7
    allow:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    groups:
      routine:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    allow:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    groups:
      routine:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      security:
        applies-to: security-updates
        patterns:
          - "*"
